  <text x="40" y="117" font-family="monospace" font-size="13" fill="#e0e7ff" font-weight="bold">"Which hook allows side effects in React?"</text>
  <text x="40" y="140" font-family="monospace" font-size="8" fill="#6366f1">Single best answer · +10 pts for correct</text>

  <!-- Answer Options -->
  <!-- Option A - correct -->
  <rect x="20" y="162" width="490" height="46" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <circle cx="48" cy="185" r="12" fill="#10b981"/>
  <text x="48" y="190" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">A</text>
  <text x="72" y="190" font-family="monospace" font-size="12" fill="#d1fae5" font-weight="bold">useEffect()</text>
