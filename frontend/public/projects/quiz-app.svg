  <rect x="20" y="270" width="490" height="46" rx="10" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
  <circle cx="48" cy="293" r="12" fill="#ef4444"/>
  <text x="48" y="298" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">C</text>
  <text x="72" y="298" font-family="monospace" font-size="12" fill="#fca5a5" font-weight="bold">useCallback()</text>
  <text x="460" y="298" font-family="monospace" font-size="18" fill="#ef4444">✗</text>
  <!-- Option D -->
  <rect x="20" y="324" width="490" height="46" rx="10" fill="#1e1b4b" stroke="#374151" stroke-width="1"/>
  <circle cx="48" cy="347" r="12" fill="#374151"/>
  <text x="48" y="352" font-family="monospace" font-size="11" fill="#9ca3af" text-anchor="middle">D</text>
  <text x="72" y="352" font-family="monospace" font-size="12" fill="#9ca3af">useContext()</text>

  <!-- Explanation -->
  <rect x="20" y="378" width="490" height="58" rx="10" fill="#1e3a2f" stroke="#10b98144" stroke-width="1"/>
  <text x="38" y="398" font-family="monospace" font-size="9" fill="#6ee7b7">💡 EXPLANATION</text>
  <text x="38" y="415" font-family="monospace" font-size="10" fill="#a7f3d0">useEffect() runs side effects after every render and handles</text>
  <text x="38" y="429" font-family="monospace" font-size="10" fill="#a7f3d0">data fetching, subscriptions, and DOM updates in React.</text>

