<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0b2e"/>
      <stop offset="100%" style="stop-color:#0f071a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff15"/>
      <stop offset="100%" style="stop-color:#ffffff05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark Purple Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  
  <!-- Subtle Laptop/Hands Silhouette (Abstract) -->
  <path d="M100,450 L700,450 L650,380 L150,380 Z" fill="#ffffff05"/>
  <circle cx="300" cy="420" r="40" fill="#ffffff05"/>
  <circle cx="500" cy="420" r="40" fill="#ffffff05"/>

  <!-- Glassmorphism Container -->
  <rect x="150" y="80" width="500" height="300" rx="20" fill="url(#glass)" stroke="#ffffff20" stroke-width="1.5" filter="url(#glow)"/>
  
  <!-- Sidebar -->
  <rect x="150" y="80" width="120" height="300" rx="20 0 0 20" fill="#ffffff08"/>
  
  <!-- AI Icon -->
  <g transform="translate(180, 120)">
    <rect width="60" height="60" rx="10" fill="#a855f720" stroke="#a855f7" stroke-width="1.5"/>
    <!-- Head/Brain Outline -->
    <path d="M15,45 Q15,15 30,15 Q45,15 45,45 L15,45" fill="none" stroke="#a855f7" stroke-width="2"/>
    <rect x="25" y="25" width="10" height="10" rx="2" fill="#a855f7"/>
    <line x1="15" y1="35" x2="25" y2="35" stroke="#a855f7" stroke-width="1"/>
    <line x1="45" y1="35" x2="55" y2="35" stroke="#a855f7" stroke-width="1"/>
    <line x1="30" y1="15" x2="30" y2="5" stroke="#a855f7" stroke-width="1"/>
  </g>

  <!-- Title "Chat AI" -->
  <text x="350" y="150" font-family="Arial, sans-serif" font-size="48" fill="#ffffff" font-weight="bold" filter="url(#glow)">Chat AI</text>

  <!-- Chat Bubbles -->
  <!-- User Message -->
  <rect x="350" y="180" width="150" height="30" rx="15" fill="#ffffff15"/>
  <path d="M360,195 L490,195" stroke="#ffffff40" stroke-width="2" stroke-linecap="round"/>
  
  <!-- AI Message -->
  <rect x="450" y="230" width="150" height="30" rx="15" fill="#a855f740" stroke="#a855f780" stroke-width="1"/>
  <path d="M460,245 L590,245" stroke="#ffffff80" stroke-width="2" stroke-linecap="round"/>
  <circle cx="615" cy="245" r="10" fill="#ffffff20" stroke="#ffffff40"/>

  <!-- Input Bar -->
  <rect x="280" y="300" width="350" height="40" rx="20" fill="#ffffff10" stroke="#ffffff20"/>
  <circle cx="610" cy="320" r="12" fill="#a855f7"/>
  <path d="M605,320 L615,320 M610,315 L610,325" stroke="#ffffff" stroke-width="2" transform="rotate(45 610 320)"/>

  <!-- Floating Particles -->
  <circle cx="200" cy="100" r="3" fill="#a855f7" opacity="0.6"/>
  <circle cx="600" cy="120" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="100" cy="300" r="4" fill="#a855f7" opacity="0.3"/>
  <circle cx="700" cy="200" r="3" fill="#ffffff" opacity="0.5"/>
</svg>
